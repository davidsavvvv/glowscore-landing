<!-- @dsCard group="Components" viewport="700x300" name="Navigation — GlassNav, NavItem" subtitle="Floating marketing pill and sidebar rows" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.544.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin:0; background:#000; font-family:var(--gs-font-sans); padding:24px; }
  .wrap { display:flex; gap:24px; align-items:flex-start; }
  .word { font-family:var(--gs-font-serif); font-weight:700; font-size:18px; color:#fff; }
  .word .g { color:var(--gs-gold); }
  .links { display:flex; gap:24px; font-size:14px; color:var(--gs-white-40); }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { GlassNav, NavItem, Button } = window.GlowScoreDesignSystem_b335d6;
    const Icon = ({ name, size = 16 }) => {
      const ref = React.useRef(null);
      React.useEffect(() => {
        if (ref.current && window.lucide) {
          ref.current.innerHTML = "";
          const el = document.createElement("i");
          el.setAttribute("data-lucide", name);
          ref.current.appendChild(el);
          window.lucide.createIcons({ attrs: { width: size, height: size }, nameAttr: "data-lucide" });
        }
      });
      return <span ref={ref} style={{ display: "inline-flex" }} />;
    };
    function Demo() {
      return (
        <div>
          <div style={{ display: "flex", justifyContent: "center", marginBottom: 28 }}>
            <GlassNav>
              <span className="word"><span className="g">Glow</span>Score</span>
              <div className="links"><span>Analyse</span><span>Science</span><span>Tarifs</span></div>
              <Button variant="white" size="sm">Mon compte</Button>
            </GlassNav>
          </div>
          <div style={{ width: 220, background: "var(--gs-surface)", border: "1px solid var(--gs-white-08)", borderRadius: "var(--gs-radius-2xl)", padding: 12, display: "flex", flexDirection: "column", gap: 4 }}>
            <NavItem icon={<Icon name="home" />}>Accueil</NavItem>
            <NavItem icon={<Icon name="layout-dashboard" />} active>Mes analyses</NavItem>
            <NavItem icon={<Icon name="settings" />}>Paramètres</NavItem>
            <NavItem icon={<Icon name="log-out" />}>Déconnexion</NavItem>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>

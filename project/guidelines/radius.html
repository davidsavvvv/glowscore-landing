<!-- @dsCard group="Spacing" viewport="700x160" name="Radius scale" subtitle="Soft, rounded shapes: xl cards, 2xl panels, full pills" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--gs-bg); font-family:var(--gs-font-sans); padding:20px; }
  .row { display:flex; gap:16px; align-items:flex-end; }
  .item { text-align:center; }
  .box { width:90px; height:70px; background:var(--gs-surface-2); border:1px solid var(--gs-white-08); }
  .pill { width:90px; height:40px; background:var(--gs-gold); border-radius:var(--gs-radius-full); }
  .name { font-size:11px; color:#fff; margin-top:8px; }
  .val { font-size:10px; color:var(--gs-muted); font-family:var(--gs-font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--gs-radius-md);"></div><div class="name">md</div><div class="val">0.4rem</div></div>
    <div class="item"><div class="box" style="border-radius:var(--gs-radius-lg);"></div><div class="name">lg · base</div><div class="val">0.5rem</div></div>
    <div class="item"><div class="box" style="border-radius:var(--gs-radius-xl);"></div><div class="name">xl · card</div><div class="val">0.75rem</div></div>
    <div class="item"><div class="box" style="border-radius:var(--gs-radius-2xl);"></div><div class="name">2xl · panel</div><div class="val">1rem</div></div>
    <div class="item"><div class="pill"></div><div class="name">full · pill</div><div class="val">9999px</div></div>
  </div>
</body>
</html>

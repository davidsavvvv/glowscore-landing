<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base; sections breathe at 96–128px" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--gs-bg); font-family:var(--gs-font-sans); padding:20px; color:#fff; }
  .row { display:flex; gap:14px; align-items:flex-end; }
  .item { text-align:center; }
  .bar { background:var(--gs-gold); width:100%; border-radius:3px; }
  .name { font-size:10px; color:var(--gs-muted); font-family:var(--gs-font-mono); margin-top:6px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item" style="width:34px;"><div class="bar" style="height:4px;"></div><div class="name">1·4</div></div>
    <div class="item" style="width:34px;"><div class="bar" style="height:8px;"></div><div class="name">2·8</div></div>
    <div class="item" style="width:34px;"><div class="bar" style="height:16px;"></div><div class="name">4·16</div></div>
    <div class="item" style="width:34px;"><div class="bar" style="height:24px;"></div><div class="name">6·24</div></div>
    <div class="item" style="width:34px;"><div class="bar" style="height:32px;"></div><div class="name">8·32</div></div>
    <div class="item" style="width:34px;"><div class="bar" style="height:48px;"></div><div class="name">12·48</div></div>
    <div class="item" style="width:48px;"><div class="bar" style="height:64px;"></div><div class="name">16·64</div></div>
    <div class="item" style="width:48px;"><div class="bar" style="height:80px;"></div><div class="name">24·96</div></div>
  </div>
</body>
</html>

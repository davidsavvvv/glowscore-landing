<!-- @dsCard group="Type" viewport="700x200" name="Display — Playfair Display" subtitle="Editorial serif for hero & section headlines, weight 700" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--gs-bg); font-family:var(--gs-font-sans); padding:24px; color:#fff; }
  .h { font-family:var(--gs-font-serif); font-weight:700; line-height:1.05; letter-spacing:-0.01em; }
  .meta { font-size:10px; color:var(--gs-muted); font-family:var(--gs-font-mono); margin-top:2px; }
  .gold { color:var(--gs-gold); }
  .stack > * + * { margin-top:14px; }
</style>
</head>
<body>
  <div class="stack">
    <div>
      <div class="h" style="font-size:56px;">Deviens un <span class="gold">10/10</span></div>
      <div class="meta">Playfair Display · 700 · 72px hero / 56px shown · lh 1.05</div>
    </div>
    <div>
      <div class="h" style="font-size:34px;">Ton analyse faciale complète</div>
      <div class="meta">Playfair Display · 700 · 36–48px section heading</div>
    </div>
  </div>
</body>
</html>

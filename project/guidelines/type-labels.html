<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--gs-surface); font-family:var(--gs-font-sans); padding:24px; }
  .row { display:flex; gap:32px; flex-wrap:wrap; }
  .eyebrow { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:var(--gs-tracking-label); color:var(--gs-white-40); }
  .meta { font-size:10px; color:var(--gs-muted); font-family:var(--gs-font-mono); margin-top:10px; }
</style>
</head>
<body>
  <div class="row">
    <span class="eyebrow">Score facial</span>
    <span class="eyebrow">Recommandations</span>
    <span class="eyebrow">Colorimétrie</span>
    <span class="eyebrow">Avant</span>
    <span class="eyebrow">Après</span>
  </div>
  <div class="meta">Inter · 700 · 12px · text-transform:uppercase · letter-spacing 0.12em · white/40</div>
</body>
</html>
